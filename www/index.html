<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>Keelstone</title>
<meta name="theme-color" content="#1b4965">
<style>
  :root{
    --blue:#1b4965; --blue-d:#12283a; --sand:#E4C989; --sand-d:#5a4715;
    --bg:#F5F2EA; --card:#ffffff; --text:#1f2d3a; --soft:#6b7a86;
    --border:#e6e0d3; --line:#efe9dc; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#dcdad6;color:var(--text);display:flex;justify-content:center}
  #app{width:100%;max-width:460px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative}
  .top{background:var(--blue);color:#fff;padding:18px 20px 16px}
  .top .row{display:flex;justify-content:space-between;align-items:center}
  .brand{font-size:19px;font-weight:600;letter-spacing:.02em}
  .pill{font-size:12px;background:#2c5c7a;color:#cfe2ee;padding:4px 11px;border-radius:20px}
  .topsub{font-size:12.5px;color:#bcd3e0;margin-top:4px}
  main{flex:1;padding:18px;overflow-y:auto}
  .nav{display:flex;background:var(--card);border-top:0.5px solid var(--border);position:sticky;bottom:0}
  .nav button{flex:1;border:none;background:none;padding:9px 0 9px;font-family:inherit;font-size:10.5px;color:#9a988e;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .nav button.on{color:var(--blue)}
  .nav .ic{font-size:20px;line-height:1}
  h1{font-size:23px;font-weight:600;margin-bottom:3px}
  .sub{font-size:13px;color:var(--soft);margin-bottom:16px}
  .card{background:var(--card);border-radius:var(--radius);padding:15px;margin-bottom:12px}
  .lab{font-size:11px;color:#9a988e;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .h{font-size:15px;font-weight:600;color:var(--text)}
  .csub{font-size:13px;color:var(--soft);line-height:1.55}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{border:0.5px solid var(--border);border-radius:20px;padding:6px 13px;font-size:12.5px;color:#4a5a67;background:var(--card);cursor:pointer}
  .chip.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
  .scale{margin-bottom:11px}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:11px;padding:12px;font-family:inherit;font-size:14px;width:100%;cursor:pointer;font-weight:500}
  .btn.sand{background:var(--sand);color:var(--sand-d)}
  .btn.ghost{background:none;border:0.5px solid var(--border);color:var(--blue)}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--line)}
  .row:last-child{border-bottom:none}
  .bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:2px}
  .bar span{display:block;height:100%;background:var(--sand)}
  input[type=text]{width:100%;padding:11px;border:0.5px solid var(--border);border-radius:11px;font-family:inherit;font-size:14px;background:var(--card);color:var(--text)}
  .seg{display:inline-flex;border:0.5px solid #2c5c7a;border-radius:9px;overflow:hidden}
  .seg button{border:none;background:transparent;padding:5px 12px;font-size:12px;font-family:inherit;color:#bcd3e0;cursor:pointer}
  .seg button.on{background:#fff;color:var(--blue)}
  .modalWrap{position:fixed;inset:0;background:rgba(18,40,58,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .modal{background:var(--card);width:100%;max-width:460px;border-radius:20px 20px 0 0;padding:22px 20px 30px}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:6px}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--blue-d);color:#fff;padding:11px 18px;border-radius:22px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  .onb{padding:40px 26px;display:flex;flex-direction:column;min-height:100vh;justify-content:center;gap:14px}
  .rolecard{border:0.5px solid var(--border);background:var(--card);border-radius:var(--radius);padding:18px;cursor:pointer;text-align:left}
  .rolecard b{font-size:16px}
  .rolecard p{font-size:13px;color:var(--soft);margin-top:4px;line-height:1.5}
  #breathOv{position:absolute;inset:0;background:radial-gradient(circle at 50% 36%,#1b4965,#0e2131 72%);z-index:80;display:flex;flex-direction:column;color:#eaf1f5;overflow:hidden}
  #breathOv .cx{position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px;z-index:5;background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:15px;cursor:pointer}
  #breathStage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;position:relative;z-index:2}
  .orbWrap{position:relative;width:260px;height:260px;display:flex;align-items:center;justify-content:center}
  .aura{position:absolute;left:50%;top:50%;width:200px;height:200px;border-radius:50%;border:1px solid rgba(228,201,137,.4);transform:translate(-50%,-50%) scale(.6);opacity:.2}
  .orb{position:absolute;left:50%;top:50%;width:168px;height:168px;border-radius:50%;background:radial-gradient(circle at 42% 36%,#ffffff,#E4C989 80%);transform:translate(-50%,-50%) scale(.5);box-shadow:0 0 40px 6px rgba(228,201,137,.28)}
  #breathRingS{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  .orbTxt{position:relative;z-index:3;text-align:center;pointer-events:none}
  .orbPhase{font-size:16px;font-weight:600;letter-spacing:.02em;color:rgba(18,40,58,.85)}
  .orbCount{font-size:50px;font-weight:700;line-height:1;margin-top:2px;min-height:.9em;color:#12283a}
  .bParticle{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:bdrift linear infinite}
  @keyframes bdrift{0%{opacity:0;transform:translateY(16px)}25%{opacity:.5}75%{opacity:.35}100%{opacity:0;transform:translateY(-56px)}}
  .bRound{font-size:12.5px;color:rgba(234,241,245,.6);min-height:1.2em;z-index:2}
  .breathCtl{padding:0 24px calc(28px + env(safe-area-inset-bottom));z-index:2;width:100%;max-width:420px;margin:0 auto}
  .breathTempo{text-align:center;font-size:13px;color:rgba(234,241,245,.75);margin-bottom:15px}
  .breathTempo input{width:100%;margin-top:8px;accent-color:#E4C989}
  .breathBtns{display:flex;gap:11px}
  .breathBtns button{flex:1;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border:none}
  .bStart{background:#E4C989;color:#5a4715}
  .bEnd{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.42)}
</style>
</head>
<body>
<div id="app">
  <div id="root"></div>
</div>
<div id="toast" class="toast"></div>
<script>
/* ---------- state ---------- */
const LS="keelstone_state_v1";
const todayStr=()=>new Date().toISOString().slice(0,10);
const defaultState={role:null,lang:null,checkins:{},goal:"",completed:[],settings:{}};
let state=load();
function load(){try{const r=localStorage.getItem(LS);if(r)return Object.assign(structuredClone(defaultState),JSON.parse(r));}catch(e){}return structuredClone(defaultState);}
function save(){localStorage.setItem(LS,JSON.stringify(state));}
function detectLang(){const l=(navigator.language||"en").toLowerCase();return (l.startsWith("nb")||l.startsWith("nn")||l.startsWith("no"))?"no":"en";}
if(!state.lang)state.lang=detectLang();

/* ---------- i18n ---------- */
const T={
  no:{
    greet:"God morgen",appname:"Keelstone",
    nav:{hjem:"Hjem",trening:"Trening",prestasjon:"Prestasjon",laere:"Lære",profil:"Profil"},
    onbTitle:"Velkommen til Keelstone",onbSub:"Mental balanse og prestasjon, tilpasset din hverdag. Hvem er du?",
    roleAnsattT:"Ansatt / fagperson",roleAnsattD:"Prester bedre og ha det bedre på jobb, uten lederansvar.",
    roleLederT:"Leder",roleLederD:"Alt en ansatt har, pluss verktøy for å lede og prestere under press.",
    changeRole:"Bytt rolle",language:"Språk",
    checkin:"Dagens innsjekk",mood:"Humør",energy:"Energi",stress:"Stress",saved:"Lagret",
    levels:["Lav","Ok","God","Høy"],
    focus:"Dagens fokus",suggest:"Forslag til deg",start:"Start",open:"Åpne",
    weekgoal:"Ukens mål",setgoal:"Sett et prosessmål for uken",savegoal:"Lagre mål",progress:"fremdrift",
    prep:"Pre-performance-rutine",prepd:"Pust, self-talk og visualisering før en viktig situasjon.",build:"Bygg rutine",
    exercises:"Øvelser",programs:"Program",articles:"Utvalgte artikler",
    trend:"Din trend",checkinsN:"innsjekk",coaching:"Vei til mer",
    coachingd:"Vil du gå dypere? Book en 1:1-samtale med Kristian.",coachbtn:"Se coaching",
    soon:"Kommer snart i denne versjonen.",pickone:"Velg et nivå for alle tre.",goalsaved:"Mål lagret.",
    breath:{phases:["Pust inn","Hold","Pust ut","Hold"],press:"Trykk start",pace:"Tempo",sec:"sek per fase",start:"Start",pause:"Pause",cont:"Fortsett",end:"Avslutt",round:"Runde",paused:"Pause",done:"Bra jobba."},
    ansatt:{pill:"Ansatt",
      focus:"Du har en presentasjon i dag. Kjør en pre-performance-rutine først.",
      sugg:"Høyt stress flere dager på rad. Prøv «Fra utbrent til bærekraftig».",
      goalPh:"F.eks. Ta tre bevisste pauser hver dag",
      third:"Etter-refleksjon",thirdd:"Logg kort hvordan det gikk.",thirdbtn:"Reflekter",
      exs:[{id:"breath",l:"Boksepust · 3 min"},{id:"soon",l:"Fokus-reset · 4 min"},{id:"soon",l:"Self-talk-vending · 5 min"},{id:"soon",l:"Fysiologisk sukk · 2 min"}],
      progs:["Prestasjon under press · 14 dager","Fra utbrent til bærekraftig · 21 dager","Fokus og flyt · 14 dager"],
      arts:["Fokus i en avbruddskultur","Restitusjon som prestasjonsverktøy","Håndtere tilbakeslag"]},
    leder:{pill:"Leder",
      focus:"1:1 med en i teamet i dag. Forbered en trygg, tydelig samtale.",
      sugg:"Vedvarende høyt stress. Se «Lederens egen restitusjon».",
      goalPh:"F.eks. Gi konkret tilbakemelding til to i teamet",
      third:"Forbered vanskelig samtale",thirdd:"Mål, motpartens perspektiv, åpningssetning.",thirdbtn:"Start forberedelse",
      exs:[{id:"breath",l:"Lederpust · 3 min"},{id:"soon",l:"Self-talk-vending · 5 min"},{id:"soon",l:"Visualisering · 6 min"},{id:"breath",l:"Boksepust · 3 min"}],
      progs:["Trygg leder under press · 21 dager","Mestre vanskelige samtaler · 14 dager","Bygg psykologisk trygghet · 21 dager"],
      arts:["Psykologisk trygghet i praksis","Gi tilbakemelding som bygger","Lede uten å brenne ut"]}
  },
  en:{
    greet:"Good morning",appname:"Keelstone",
    nav:{hjem:"Home",trening:"Train",prestasjon:"Perform",laere:"Learn",profil:"Profile"},
    onbTitle:"Welcome to Keelstone",onbSub:"Mental balance and performance, built for your workday. Who are you?",
    roleAnsattT:"Employee / professional",roleAnsattD:"Perform better and feel better at work, without a leadership role.",
    roleLederT:"Leader",roleLederD:"Everything an employee has, plus tools to lead and perform under pressure.",
    changeRole:"Switch role",language:"Language",
    checkin:"Today's check-in",mood:"Mood",energy:"Energy",stress:"Stress",saved:"Saved",
    levels:["Low","Ok","Good","High"],
    focus:"Today's focus",suggest:"For you",start:"Start",open:"Open",
    weekgoal:"This week's goal",setgoal:"Set a process goal for the week",savegoal:"Save goal",progress:"progress",
    prep:"Pre-performance routine",prepd:"Breath, self-talk and visualization before a high-stakes moment.",build:"Build routine",
    exercises:"Exercises",programs:"Program",articles:"Featured reads",
    trend:"Your trend",checkinsN:"check-ins",coaching:"Go further",
    coachingd:"Want to go deeper? Book a 1:1 session with Kristian.",coachbtn:"See coaching",
    soon:"Coming in a later version.",pickone:"Pick a level for all three.",goalsaved:"Goal saved.",
    breath:{phases:["Breathe in","Hold","Breathe out","Hold"],press:"Press start",pace:"Pace",sec:"sec per phase",start:"Start",pause:"Pause",cont:"Continue",end:"End",round:"Round",paused:"Paused",done:"Well done."},
    ansatt:{pill:"Employee",
      focus:"You have a presentation today. Run a pre-performance routine first.",
      sugg:"High stress several days running. Try \"From burnout to sustainable\".",
      goalPh:"E.g. Take three deliberate breaks each day",
      third:"Post-event reflection",thirdd:"Briefly log how it went.",thirdbtn:"Reflect",
      exs:[{id:"breath",l:"Box breathing · 3 min"},{id:"soon",l:"Focus reset · 4 min"},{id:"soon",l:"Self-talk reframe · 5 min"},{id:"soon",l:"Physiological sigh · 2 min"}],
      progs:["Performance under pressure · 14 days","From burnout to sustainable · 21 days","Focus and flow · 14 days"],
      arts:["Focus in a culture of interruption","Recovery as a performance tool","Bouncing back from setbacks"]},
    leder:{pill:"Leader",
      focus:"1:1 with a team member today. Prepare a calm, clear conversation.",
      sugg:"Sustained high stress. See \"The leader's own recovery\".",
      goalPh:"E.g. Give concrete feedback to two team members",
      third:"Prepare a difficult conversation",thirdd:"Goal, their perspective, opening line.",thirdbtn:"Start prep",
      exs:[{id:"breath",l:"Leader's breath · 3 min"},{id:"soon",l:"Self-talk reframe · 5 min"},{id:"soon",l:"Visualization · 6 min"},{id:"breath",l:"Box breathing · 3 min"}],
      progs:["Steady leader under pressure · 21 days","Master difficult conversations · 14 days","Build psychological safety · 21 days"],
      arts:["Psychological safety in practice","Feedback that builds","Leading without burning out"]}
  }
};
function t(k){return T[state.lang][k];}
function tr(){return T[state.lang][state.role];}

/* ---------- helpers ---------- */
const root=document.getElementById("root");
let tab="hjem";
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1900);}
function openModal(h){closeModal();const w=document.createElement("div");w.className="modalWrap";w.id="mw";w.innerHTML='<div class="modal">'+h+'</div>';w.onclick=e=>{if(e.target===w)closeModal();};document.getElementById("app").appendChild(w);}
function closeModal(){const w=document.getElementById("mw");if(w)w.remove();}

/* ---------- render ---------- */
function render(){
  if(!state.role){root.innerHTML=onboarding();return;}
  const r=tr();
  let h='<div class="top"><div class="row"><span class="brand">'+t("appname")+'</span><span class="pill">'+r.pill+'</span></div><div class="topsub">'+t("greet")+'</div></div><main id="main"></main>';
  h+='<div class="nav" id="nav"></div>';
  root.innerHTML=h;
  const m=document.getElementById("main");
  if(tab==="hjem")m.innerHTML=vHome();
  else if(tab==="prestasjon")m.innerHTML=vPerform();
  else if(tab==="trening")m.innerHTML=vTrain();
  else if(tab==="laere")m.innerHTML=vLearn();
  else m.innerHTML=vProfile();
  const nav=document.getElementById("nav");const ic={hjem:"🏠",trening:"🧭",prestasjon:"🎯",laere:"📖",profil:"👤"};
  nav.innerHTML=["hjem","trening","prestasjon","laere","profil"].map(k=>'<button data-t="'+k+'" class="'+(tab===k?"on":"")+'"><span class="ic">'+ic[k]+'</span>'+t("nav")[k]+'</button>').join("");
  nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{tab=b.dataset.t;render();m&&(document.getElementById("main").scrollTop=0);});
}
function onboarding(){
  return '<div class="onb"><div><h1>'+t("onbTitle")+'</h1><div class="sub">'+t("onbSub")+'</div></div>'+
    '<button class="rolecard" onclick="pickRole(\'ansatt\')"><b>'+t("roleAnsattT")+'</b><p>'+t("roleAnsattD")+'</p></button>'+
    '<button class="rolecard" onclick="pickRole(\'leder\')"><b>'+t("roleLederT")+'</b><p>'+t("roleLederD")+'</p></button>'+
    '<div style="text-align:center;margin-top:8px"><span class="seg" style="border-color:var(--border)"><button class="'+(state.lang==="no"?"on":"")+'" style="color:var(--soft)" onclick="setLang(\'no\')">Norsk</button><button class="'+(state.lang==="en"?"on":"")+'" style="color:var(--soft)" onclick="setLang(\'en\')">English</button></span></div></div>';
}
function pickRole(r){state.role=r;save();tab="hjem";render();}
function setLang(l){state.lang=l;save();render();}

function scaleRow(key,idx){
  const chips=t("levels").map((o,i)=>'<span class="chip'+(idx===i?" sel":"")+'" onclick="setScale(\''+key+'\','+i+')">'+o+'</span>').join("");
  return '<div class="scale"><div class="lab" style="margin-bottom:6px">'+t(key)+'</div><div class="chips">'+chips+'</div></div>';
}
function setScale(key,i){const d=todayStr();const c=state.checkins[d]||(state.checkins[d]={});c[key]=i;save();render();}
function vHome(){
  const r=tr();const c=state.checkins[todayStr()]||{};
  let h='<div class="card"><div class="h" style="margin-bottom:12px">'+t("checkin")+'</div>'+
    scaleRow("mood",c.mood)+scaleRow("energy",c.energy)+scaleRow("stress",c.stress)+
    (c.mood!=null&&c.energy!=null&&c.stress!=null?'<div class="csub" style="color:var(--blue);margin-top:2px">✓ '+t("saved")+'</div>':'')+'</div>';
  h+='<div class="card"><div class="lab">'+t("focus")+'</div><div class="csub" style="color:var(--text);font-size:14px;margin-bottom:11px">'+esc(r.focus)+'</div><button class="btn sand" onclick="openBreath()">'+t("start")+'</button></div>';
  h+='<div class="card"><div class="lab">'+t("suggest")+'</div><div class="csub" style="margin-bottom:11px">'+esc(r.sugg)+'</div><button class="btn" onclick="tab=\'trening\';render()">'+t("open")+'</button></div>';
  return h;
}
function vPerform(){
  const r=tr();
  let h='<h1>'+t("nav").prestasjon+'</h1><div class="sub">'+t("weekgoal")+'</div>';
  if(state.goal){
    h+='<div class="card"><div class="lab">'+t("weekgoal")+'</div><div class="h" style="font-size:14px;margin-bottom:10px">'+esc(state.goal)+'</div><div class="bar"><span style="width:45%"></span></div><div class="csub" style="margin-top:5px">45% '+t("progress")+'</div><button class="btn ghost" style="margin-top:11px" onclick="editGoal()">'+t("setgoal")+'</button></div>';
  }else{
    h+='<div class="card"><div class="lab">'+t("weekgoal")+'</div><input type="text" id="goalInput" placeholder="'+esc(r.goalPh)+'" style="margin-bottom:11px"><button class="btn" onclick="saveGoal()">'+t("savegoal")+'</button></div>';
  }
  h+='<div class="card"><div class="h" style="margin-bottom:4px">'+t("prep")+'</div><div class="csub" style="margin-bottom:11px">'+t("prepd")+'</div><button class="btn sand" onclick="toast(t(\'soon\'))">'+t("build")+'</button></div>';
  h+='<div class="card"><div class="h" style="margin-bottom:4px">'+esc(r.third)+'</div><div class="csub" style="margin-bottom:11px">'+esc(r.thirdd)+'</div><button class="btn" onclick="toast(t(\'soon\'))">'+esc(r.thirdbtn)+'</button></div>';
  return h;
}
function editGoal(){state.goal="";save();render();}
function saveGoal(){const v=document.getElementById("goalInput").value.trim();if(!v)return;state.goal=v;save();toast(t("goalsaved"));render();}
function vTrain(){
  const r=tr();
  let h='<h1>'+t("nav").trening+'</h1><div class="sub">'+t("exercises")+'</div>';
  h+='<div class="card">'+r.exs.map(e=>'<div class="row" onclick="openExercise(\''+e.id+'\')"><span style="font-size:14px">'+esc(e.l)+'</span><span style="color:var(--blue);font-size:18px">▶</span></div>').join("")+'</div>';
  h+='<div class="sub" style="margin-top:6px">'+t("programs")+'</div>';
  h+='<div class="card">'+r.progs.map(p=>'<div class="row" onclick="toast(t(\'soon\'))"><span style="font-size:14px">'+esc(p)+'</span><span style="color:var(--blue);font-size:16px">→</span></div>').join("")+'</div>';
  return h;
}
function vLearn(){
  const r=tr();
  let h='<h1>'+t("nav").laere+'</h1><div class="sub">'+t("articles")+'</div>';
  h+='<div class="card">'+r.arts.map(a=>'<div class="row" onclick="toast(t(\'soon\'))"><span style="font-size:14px">'+esc(a)+'</span><span style="color:var(--blue);font-size:16px">→</span></div>').join("")+'</div>';
  return h;
}
/* ---------- breathing exercise (animated) ---------- */
const BR_R=96, BR_C=2*Math.PI*BR_R;
let brRaf=null, brPhase=0;
function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function openExercise(id){ if(id==="breath")openBreath(); else toast(t("soon")); }
function openBreath(){
  brPhase=0; const b=T[state.lang].breath;
  const ov=document.createElement("div"); ov.id="breathOv";
  let parts="";
  for(let i=0;i<16;i++){const l=Math.round(Math.random()*100),bo=Math.round(8+Math.random()*72),d=(6+Math.random()*7).toFixed(1),dl=(Math.random()*8).toFixed(1),s=(2+Math.random()*2.5).toFixed(1);
    parts+='<div class="bParticle" style="left:'+l+'%;bottom:'+bo+'%;width:'+s+'px;height:'+s+'px;animation-duration:'+d+'s;animation-delay:'+dl+'s"></div>';}
  ov.innerHTML=parts+
    '<button class="cx" onclick="closeBreath()">✕</button>'+
    '<div id="breathStage"><div class="orbWrap">'+
      '<div class="aura" id="aura2"></div><div class="aura" id="aura1"></div>'+
      '<div class="orb" id="brOrb"></div>'+
      '<svg id="breathRingS" width="232" height="232" viewBox="0 0 232 232"><circle cx="116" cy="116" r="'+BR_R+'" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="4"/>'+
      '<circle id="brRing" cx="116" cy="116" r="'+BR_R+'" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+BR_C.toFixed(1)+'" stroke-dashoffset="'+BR_C.toFixed(1)+'" transform="rotate(-90 116 116)"/></svg>'+
      '<div class="orbTxt"><div class="orbPhase" id="brPhaseTxt">'+b.press+'</div><div class="orbCount" id="brCountTxt"></div></div>'+
    '</div><div class="bRound" id="brRoundTxt"></div></div>'+
    '<div class="breathCtl"><div class="breathTempo">'+b.pace+': <b id="brTempoVal">4</b> '+b.sec+'<input type="range" id="brTempo" min="3" max="6" step="0.5" value="4"></div>'+
      '<div class="breathBtns"><button class="bStart" id="brStart">'+b.start+'</button><button class="bEnd" onclick="endBreath()">'+b.end+'</button></div></div>';
  document.getElementById("app").appendChild(ov);
  document.getElementById("brTempo").oninput=e=>document.getElementById("brTempoVal").textContent=e.target.value;
  document.getElementById("brStart").onclick=toggleBreath;
}
function toggleBreath(){
  const btn=document.getElementById("brStart"); const b=T[state.lang].breath;
  if(brRaf){ stopBreath(); btn.textContent=b.cont; document.getElementById("brPhaseTxt").textContent=b.paused; document.getElementById("brCountTxt").textContent=""; return; }
  btn.textContent=b.pause; runBreath();
}
function runBreath(){
  let start=null; const b=T[state.lang].breath;
  const tick=ts=>{
    const orb=document.getElementById("brOrb"); if(!orb){brRaf=null;return;}
    const tempo=parseFloat(document.getElementById("brTempo").value)*1000;
    if(start===null)start=ts;
    const t=Math.min((ts-start)/tempo,1), ph=brPhase%4;
    let bv; if(ph===0)bv=easeInOut(t); else if(ph===1)bv=1; else if(ph===2)bv=easeInOut(1-t); else bv=0;
    orb.style.transform="translate(-50%,-50%) scale("+(0.5+0.5*bv).toFixed(3)+")";
    orb.style.boxShadow="0 0 "+Math.round(38+52*bv)+"px "+Math.round(6+10*bv)+"px rgba(228,201,137,"+(0.24+0.32*bv).toFixed(2)+")";
    const a1=document.getElementById("aura1"), a2=document.getElementById("aura2");
    a1.style.transform="translate(-50%,-50%) scale("+(0.6+0.5*bv).toFixed(3)+")"; a1.style.opacity=(0.14+0.34*bv).toFixed(2);
    a2.style.transform="translate(-50%,-50%) scale("+(0.72+0.82*bv).toFixed(3)+")"; a2.style.opacity=(0.08+0.2*bv).toFixed(2);
    document.getElementById("brRing").style.strokeDashoffset=(BR_C*(1-bv)).toFixed(1);
    document.getElementById("brPhaseTxt").textContent=b.phases[ph];
    const secs=Math.ceil((tempo-(ts-start))/1000);
    document.getElementById("brCountTxt").textContent=secs>0?secs:"";
    document.getElementById("brRoundTxt").textContent=b.round+" "+(Math.floor(brPhase/4)+1);
    if(t>=1){brPhase++;start=null;}
    brRaf=requestAnimationFrame(tick);
  };
  brRaf=requestAnimationFrame(tick);
}
function stopBreath(){ if(brRaf){cancelAnimationFrame(brRaf);brRaf=null;} }
function endBreath(){ if(!state.completed.includes("breath"))state.completed.push("breath"); save(); closeBreath(); toast(T[state.lang].breath.done); }
function closeBreath(){ stopBreath(); const ov=document.getElementById("breathOv"); if(ov)ov.remove(); }

function vProfile(){
  const n=Object.keys(state.checkins).length;
  let h='<h1>'+t("nav").profil+'</h1><div class="sub">'+t("trend")+'</div>';
  h+='<div class="card"><div class="lab">'+t("trend")+'</div><div style="font-size:26px;font-weight:600;color:var(--blue)">'+n+'</div><div class="csub">'+t("checkinsN")+'</div></div>';
  h+='<div class="card"><div class="row"><span style="font-size:14px">'+t("language")+'</span><span class="seg" style="border-color:var(--border)"><button class="'+(state.lang==="no"?"on":"")+'" style="color:var(--soft)" onclick="setLang(\'no\')">NO</button><button class="'+(state.lang==="en"?"on":"")+'" style="color:var(--soft)" onclick="setLang(\'en\')">EN</button></span></div>'+
    '<div class="row"><span style="font-size:14px">'+t("changeRole")+'</span><button class="chip" onclick="state.role=null;save();render()">'+tr().pill+'</button></div></div>';
  h+='<div class="card" style="background:var(--blue)"><div class="lab" style="color:#bcd3e0">'+t("coaching")+'</div><div class="csub" style="color:#e7eef3;margin-bottom:11px">'+t("coachingd")+'</div><a class="btn sand" style="display:block;text-align:center;text-decoration:none" href="https://cliffordcoaching.no" target="_blank">'+t("coachbtn")+'</a></div>';
  return h;
}
render();
</script>
