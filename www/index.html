<style>
  :root {
    --blue: #2F4F4F;
    --blue-d: #1f3636;
    --blue-light: #e4ecea;
    --sand: #D9B25C;

    --border: #e5e3dd;

    --page-bg: #d6dbd9;

  }

    :root {
      --blue: #7fa39c; --blue-d: #3f5f5c; --blue-light: #1c2a29;
      --sand: #e0bb63; --sand-light: #362b12;
      --bg: #141918; --card: #1c2422; --text: #eef1f0; --text-soft: #9aa3a0;
      --border: #2b3432; --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.35);
      --page-bg: #0c0f0e;
      --cat-fokus: #3987e5; --cat-ro: #199e70; --cat-selvtillit: #9085e9; --cat-restitusjon: #e66767;
    }
  }
  :root[data-theme="dark"] {
    --blue: #7fa39c; --blue-d: #3f5f5c; --blue-light: #1c2a29;
    --sand: #e0bb63; --sand-light: #362b12;
    --bg: #141918; --card: #1c2422; --text: #eef1f0; --text-soft: #9aa3a0;
    --border: #2b3432; --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.35);
    --page-bg: #0c0f0e;
    --cat-fokus: #3987e5; --cat-ro: #199e70; --cat-selvtillit: #9085e9; --cat-restitusjon: #e66767;
  }
  :root[data-theme="light"] {
    --blue: #2F4F4F; --blue-d: #1f3636; --blue-light: #e4ecea;
    --sand: #D9B25C; --sand-light: #fbf0dc;
    --bg: #f9f9f9; --card: #ffffff; --text: #1a1a1a; --text-soft: #5f6f6f;
    --border: #e5e3dd; --shadow: 0 1px 3px rgba(31,54,54,0.06), 0 4px 14px rgba(31,54,54,0.09);
    --page-bg: #d6dbd9;
    --cat-fokus: #2a78d6; --cat-ro: #1baf7a; --cat-selvtillit: #4a3aa7; --cat-restitusjon: #e34948;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--page-bg); color: var(--text); display: flex; justify-content: center; }
  #app { width: 100%; max-width: 460px; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.15); }
  #app.onboarding header, #app.onboarding nav { display: none; }
  #app.onboarding main { padding-top: calc(26px + env(safe-area-inset-top)); }
  main { flex: 1; overflow-y: auto; padding: 20px 18px calc(90px + env(safe-area-inset-bottom)); }
  h1 { font-size: 1.45rem; font-weight: 700; margin-bottom: 2px; letter-spacing: 0.2px; }
  h2 { font-size: 1.05rem; font-weight: 600; margin: 22px 0 10px; }
  .sub { color: var(--text-soft); font-size: 0.9rem; margin-bottom: 18px; }
  .card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .card:active { transform: scale(0.985); }
  .cardLabel { font-size: 0.76rem; color: var(--text-soft); font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .btn { display: inline-block; border: none; border-radius: 12px; padding: 11px 18px; font-size: 0.95rem; font-weight: 600; cursor: pointer; background: var(--blue); color: #fff; font-family: inherit; transition: transform 0.12s ease; }
  .btn:active { background: var(--blue-d); transform: scale(0.96); }
  .btn.sand { background: var(--sand); color: #fff; }
  .btn.secondary { background: var(--blue-light); color: var(--blue-d); }
  .btn.ghost { background: transparent; color: var(--blue-d); padding: 8px 10px; }
  .btn.small { padding: 7px 12px; font-size: 0.85rem; }
  .btn.full { width: 100%; text-align: center; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  header { display: flex; justify-content: space-between; align-items: center; padding: calc(14px + env(safe-area-inset-top)) 18px 0; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--blue); font-size: 1.15rem; letter-spacing: 0.2px; }
  .brand .mark { width: 30px; height: 30px; border-radius: 8px; background: var(--blue); color: var(--sand); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.95rem; flex-shrink: 0; }
  .streakBadge { background: var(--sand-light); color: var(--sand); border-radius: 999px; padding: 6px 12px; font-size: 0.82rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
  nav { position: absolute; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; padding: 6px 4px calc(8px + env(safe-area-inset-bottom)); }
  nav button { flex: 1; background: none; border: none; font-family: inherit; font-size: 0.68rem; color: var(--text-soft); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; }
  nav button .ico { display: flex; align-items: center; justify-content: center; line-height: 1; border-radius: 8px; padding: 6px 14px; transition: background 0.18s; }
  nav button.active { color: var(--blue-d); font-weight: 700; }
  nav button.active .ico { background: var(--blue-light); }
  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 6px; }
  .chips button { border: 1px solid var(--border); background: var(--card); border-radius: 999px; padding: 7px 14px; font-size: 0.82rem; font-family: inherit; cursor: pointer; white-space: nowrap; color: var(--text-soft); }
  .chips button.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
  .exCard { display: flex; align-items: center; gap: 12px; cursor: pointer; }

  .exCard .meta { flex: 1; min-width: 0; }

  .lockDot { display: flex; align-items: center; color: var(--text-soft); flex-shrink: 0; }
  .favBtn { background: none; border: none; display: inline-flex; align-items: center; justify-content: center; color: var(--sand); cursor: pointer; padding: 4px; flex-shrink: 0; }
  .tag { display: inline-block; font-size: 0.7rem; font-weight: 700; background: var(--blue-light); color: var(--blue-d); border-radius: 999px; padding: 3px 9px; margin-right: 5px; }
  .tag.sand { background: var(--sand-light); color: var(--sand); }
  .heroCard { background: linear-gradient(135deg, var(--blue), var(--blue-d)); color: #fff; }
  .heroCard .tag { background: rgba(255,255,255,0.18); color: #fff; }
  .heroCard p { font-size: 1.02rem; font-weight: 600; margin: 8px 0 12px; }
  .statRow { display: flex; gap: 10px; margin-bottom: 14px; }
  .statBox { flex: 1; background: var(--card); border-radius: var(--radius); padding: 14px; text-align: center; box-shadow: var(--shadow); }
  .statBox b { font-size: 1.4rem; display: block; color: var(--blue); }
  .statBox span { font-size: 0.75rem; color: var(--text-soft); }
  .ringCard { display: flex; align-items: center; gap: 16px; }
  .ringMeta { display: flex; flex-direction: column; }
  .ringMeta b { font-size: 1.5rem; color: var(--blue); }
  .ringMeta span { font-size: 0.8rem; color: var(--text-soft); }
  .moodRow { display: flex; justify-content: space-between; gap: 6px; }
  .moodBtn { flex: 1; background: var(--blue-light); border: none; border-radius: 12px; font-size: 1.35rem; padding: 9px 0; cursor: pointer; opacity: 0.5; transition: opacity 0.15s, transform 0.15s; }
  .moodBtn.on { opacity: 1; background: var(--sand-light); transform: scale(1.08); }
  textarea, input[type=text], input[type=time] { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-family: inherit; font-size: 0.92rem; resize: vertical; background: var(--card); color: var(--text); }
  textarea:focus, input:focus { outline: 2px solid var(--blue-light); border-color: var(--blue); }
  .journalEntry { border-left: 4px solid var(--sand); }
  .journalEntry .date { font-size: 0.78rem; color: var(--text-soft); margin-bottom: 6px; }
  .journalEntry p { font-size: 0.9rem; margin-bottom: 6px; line-height: 1.4; }
  .journalEntry b { font-size: 0.82rem; color: var(--blue-d); }
  .backRow { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .backRow button:first-child { background: var(--card); border: 1px solid var(--border); border-radius: 999px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: var(--text); }
  .manus { font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  audio { width: 100%; margin: 10px 0; }
  .audioFallback { background: var(--sand-light); color: var(--sand); border-radius: 10px; padding: 10px 12px; font-size: 0.82rem; margin: 10px 0; display: flex; align-items: flex-start; gap: 8px; }
  .playerBar { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; margin: 14px 0; }
  .playerBarFill { height: 100%; width: 0%; background: var(--blue); transition: width 1s linear; }
  .doneCard { text-align: center; }
  .doneCard b { display: block; font-size: 1.05rem; margin-bottom: 6px; }
  .doneCard p { font-size: 0.85rem; color: var(--text-soft); margin-bottom: 12px; }
  .weekChart { display: flex; justify-content: space-between; align-items: flex-end; height: 96px; gap: 6px; }
  .weekBar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 4px; height: 100%; }
  .weekVal { font-size: 0.68rem; color: var(--text-soft); min-height: 1em; }
  .weekBarFill { width: 100%; max-width: 22px; background: var(--blue); border-radius: 4px 4px 0 0; }
  .weekDay { font-size: 0.68rem; color: var(--text-soft); }
  .weekDay.today { color: var(--blue); font-weight: 700; }
  .catBarRow { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .catBarRow:last-child { margin-bottom: 0; }
  .catBarLabel { font-size: 0.82rem; width: 96px; flex-shrink: 0; }
  .catBarTrack { flex: 1; height: 10px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .catBarFill { height: 100%; border-radius: 6px; }
  .catBarVal { font-size: 0.8rem; color: var(--text-soft); width: 20px; text-align: right; flex-shrink: 0; }
  .weekMoodRow { display: flex; justify-content: space-between; gap: 4px; margin-top: 8px; }
  .weekMoodCell { flex: 1; text-align: center; font-size: 1.25rem; }
  .weekMoodCell.empty { color: var(--border); font-size: 1rem; }
  .modalWrap { position: absolute; inset: 0; background: rgba(18,40,58,0.5); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
  .modalWrap.show { display: flex; }
  .modalSheet { width: 100%; max-width: 460px; background: var(--card); border-radius: 20px 20px 0 0; padding: 22px 20px calc(24px + env(safe-area-inset-bottom)); max-height: 85vh; overflow-y: auto; }
  .modalSheet h2 { margin-top: 0; }
  .toast { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--blue-d); color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 0.85rem; z-index: 60; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toggleRow { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .toggleRow input[type=time] { width: auto; padding: 6px 10px; }
  .switch { position: relative; width: 44px; height: 26px; background: var(--border); border-radius: 999px; cursor: pointer; flex-shrink: 0; }
  .switch.on { background: var(--blue); }
  .switch .dot { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform 0.18s; }
  .switch.on .dot { transform: translateX(18px); }
  .qBlock { margin-bottom: 14px; }
  .qBlock label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--blue-d); }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; flex-shrink: 0; }
  .seg button { border: none; background: var(--card); padding: 6px 14px; font-size: 0.8rem; font-family: inherit; color: var(--text-soft); cursor: pointer; }
  .seg button.on { background: var(--blue); color: #fff; }
  .segFull { display: flex; width: 100%; margin-bottom: 18px; }
  .segFull button { flex: 1; padding: 9px 0; }
  .onbCard { display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .goalGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; margin-top: 10px; }
  .goalBtn { display: flex; align-items: center; gap: 7px; border: 1px solid var(--border); background: var(--card); border-radius: 10px; padding: 9px 10px; font-size: 0.82rem; font-family: inherit; color: var(--text-soft); cursor: pointer; }
  .goalBtn.on { background: var(--blue); border-color: var(--blue); color: #fff; }
  #splash { position: absolute; inset: 0; z-index: 100; background: var(--blue-d); display: flex; align-items: center; justify-content: center; flex-direction: column; animation: splashExit 0.45s ease 2.55s both; pointer-events: none; }
  #splashRing1 { transform-origin: 50px 50px; opacity: 0; animation: splashRing1In 0.6s cubic-bezier(0.34, 1.35, 0.64, 1) 0.1s both; }
  #splashRing2 { transform-origin: 50px 50px; opacity: 0; animation: splashRing2In 0.6s cubic-bezier(0.34, 1.35, 0.64, 1) 0.28s both; }
  #splashDot { transform-origin: 50px 50px; opacity: 0; animation: splashDotIn 0.45s cubic-bezier(0.34, 1.35, 0.64, 1) 0.5s both; }
  #splashWord { font-family: "Manrope", -apple-system, sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: 0.14em; margin-top: 18px; opacity: 0; animation: splashWordIn 0.5s ease 0.85s both; }
  #splashTagline { font-family: "Manrope", -apple-system, sans-serif; font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-top: 9px; opacity: 0; text-align: center; max-width: 230px; line-height: 1.45; animation: splashWordIn 0.4s ease 1.15s both; }
  @keyframes splashRing1In { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 0.35; } }
  @keyframes splashRing2In { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 0.7; } }
  @keyframes splashDotIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes splashWordIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes splashExit { to { opacity: 0; } }
  #breathOverlay { position: absolute; inset: 0; background: radial-gradient(circle at 50% 36%, var(--blue), var(--blue-d) 78%); z-index: 40; display: none; flex-direction: column; align-items: center; color: #eaf1f5; padding: calc(20px + env(safe-area-inset-top)) 20px 20px; overflow: hidden; }
  #breathOverlay.show { display: flex; }
  #breathOverlay .closeRow { width: 100%; display: flex; justify-content: space-between; align-items: center; z-index: 5; }
  #breathOverlay .closeRow button { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 999px; width: 36px; height: 36px; font-size: 1rem; cursor: pointer; flex-shrink: 0; }
  #breathOverlay .routineTitle { font-size: 0.85rem; opacity: 0.85; }
  #breathStage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; width: 100%; position: relative; }
  .orbWrap { position: relative; width: 240px; height: 240px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .aura { position: absolute; left: 50%; top: 50%; width: 190px; height: 190px; border-radius: 50%; border: 1px solid rgba(228,201,137,.4); transform: translate(-50%,-50%) scale(.6); opacity: .2; }
  .orb { position: absolute; left: 50%; top: 50%; width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle at 42% 36%, #ffffff, var(--sand) 80%); transform: translate(-50%,-50%) scale(0.55); box-shadow: 0 0 40px 6px rgba(217,178,92,0.28); }
  #breathRingS { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); }
  .orbTxt { position: relative; z-index: 3; text-align: center; pointer-events: none; }
  .orbPhase { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: #1f3636; }
  .orbCount { font-size: 46px; font-weight: 800; line-height: 1; margin-top: 2px; min-height: 0.9em; color: #1f3636; }
  .bParticle { position: absolute; border-radius: 50%; background: #fff; opacity: 0; animation: bdrift linear infinite; }
  @keyframes bdrift { 0%{opacity:0;transform:translateY(16px)} 25%{opacity:.5} 75%{opacity:.35} 100%{opacity:0;transform:translateY(-56px)} }
  .bRound { font-size: 12.5px; color: rgba(234,241,245,.65); min-height: 1.2em; }
  .bSafetyNote { font-size: 12px; color: rgba(234,241,245,.55); text-align: center; max-width: 260px; margin: 4px auto 0; line-height: 1.4; }
  #breathOverlay .controls { padding-top: 10px; padding-bottom: 26px; width: 100%; max-width: 340px; }
  #breathOverlay .tempoRow { text-align: center; font-size: 13px; color: rgba(234,241,245,.75); margin-bottom: 15px; }
  #breathOverlay .tempoRow input { width: 100%; margin-top: 8px; accent-color: var(--sand); }
  #breathOverlay .btnRow { display: flex; gap: 10px; }
  #breathOverlay .btnRow button { flex: 1; padding: 12px; border-radius: 12px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; }
  #breathOverlay .bStart { background: var(--sand); color: #fff; }
  #breathOverlay .bEnd { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.4); }
  #yogaOverlay { position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, var(--blue), var(--blue-d) 80%); z-index: 40; display: none; flex-direction: column; align-items: center; color: #eaf1f5; padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)); overflow: hidden; }
  #yogaOverlay.show { display: flex; }
  #yogaOverlay .closeRow { width: 100%; display: flex; justify-content: space-between; align-items: center; z-index: 5; }
  #yogaOverlay .closeRow button { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 999px; width: 36px; height: 36px; font-size: 1rem; cursor: pointer; flex-shrink: 0; }
  #yogaOverlay .routineTitle { font-size: 0.85rem; opacity: 0.85; }
  #yogaStage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; width: 100%; }
  .yogaArtWrap { width: 190px; height: 200px; display: flex; align-items: center; justify-content: center; }
  .yogaGlyph { animation: yogaGlyphPulse 3.2s ease-in-out infinite; transform-origin: 50% 50%; filter: drop-shadow(0 0 14px rgba(217,178,92,0.35)); }
  @keyframes yogaGlyphPulse { 0%, 100% { transform: scale(0.92); opacity: 0.8; } 50% { transform: scale(1.03); opacity: 1; } }
  .yogaPoseName { font-size: 1.2rem; font-weight: 700; text-align: center; }
  .yogaCue { font-size: 0.85rem; color: rgba(255,255,255,0.75); text-align: center; max-width: 260px; line-height: 1.4; margin-top: -6px; }
  .yogaCount { font-size: 2.6rem; font-weight: 700; min-height: 1em; transition: color 0.2s; }
  .yogaCount.countdown { color: var(--sand); animation: yogaCountPulse 1s ease-in-out infinite; }
  @keyframes yogaCountPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .yogaIntroMeta { font-size: 0.9rem; color: rgba(255,255,255,0.75); }
  .yogaDots { display: flex; gap: 6px; }
  .yogaDot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: transform 0.15s, background 0.15s; }

  no: [
    { id: 'fokus-1', category: 'fokus', title: 'Pre-konkurranse fokus', duration: '5 min',
      manus: `Sett deg til rette, eller stå om det passer bedre før du skal prestere.\n\nTa tre dype åndedrag. Kjenn skuldrene falle litt hver gang du puster ut.\n\nSpør deg selv: hva er den ene tingen jeg skal fokusere på nå? Ikke resultatet. Ikke hva andre tenker. Bare den ene handlingen som er foran deg.\n\nSi den handlingen til deg selv, høyt eller inni deg. "Jeg fokuserer på ______."\n\nKjenn at kroppen er klar. Du har trent for dette. Du trenger ikke å være perfekt, du trenger bare å være til stede i det som skjer nå.\n\nNår du er klar, reis deg opp, eller åpne øynene, og gå inn i det som venter deg med det ene fokuset ditt.` },
    { id: 'fokus-2', category: 'fokus', title: 'Konsentrasjon under press', duration: '7 min',
      manus: `Press er ikke fienden din. Press er et tegn på at noe betyr noe for deg.\n\nLegg merke til hvor i kroppen du kjenner presset akkurat nå. Pust inn i det området, ikke bort fra det.\n\nNår tankene begynner å spinne, gjør dette: navngi tre ting du kan se, tre ting du kan høre, og legg merke til hvordan du sitter eller står. Dette bringer deg tilbake til nået.\n\nSpør deg selv: hva er innenfor min kontroll akkurat nå? Fokuser bare der.\n\nGjenta for deg selv: "Jeg trenger ikke kontrollere alt. Jeg trenger bare å gjøre neste riktige ting."\n\nTa ett dypt åndedrag til, og gå videre med et smalere, klarere fokus.` },
    { id: 'fokus-3', category: 'fokus', title: 'Nullstill mellom oppgaver', duration: '4 min',
      manus: `Denne øvelsen er for de øyeblikkene mellom ting — mellom møter, mellom sett, mellom eksamensoppgaver.\n\nLukk øynene om du kan. Ta et åndedrag som varer litt lenger enn vanlig.\n\nSe for deg at det du nettopp gjorde legges ned, som en boks du setter fra deg. Det er ferdig. Det trenger ikke følge deg videre.\n\nSpør deg selv: hva krever den neste oppgaven av meg? Hent frem den energien nå, ikke energien fra det som var.\n\nStrekk gjerne litt på kroppen. Rull skuldrene bakover én gang.\n\nDu er nullstilt. Klar for det neste.` },
    { id: 'ro-1', category: 'ro', title: 'Boksepusting for ro', duration: '5 min',
      manus: `Denne øvelsen bruker boksepusting: fire like deler — inn, hold, ut, hold.\n\nSett deg komfortabelt. Slipp skuldrene ned fra ørene.\n\nPust inn gjennom nesen i fire sekunder. Hold pusten i fire sekunder. Pust ut gjennom munnen i fire sekunder. Hold tom i fire sekunder.\n\nGjenta dette mønsteret. Du kan bruke pusteøvelsen i appen som en visuell guide til rytmen.\n\nHver runde du gjennomfører sender kroppen en beskjed: det er trygt å senke tempoet nå. Nervesystemet ditt lytter til pusten din.\n\nFortsett i ditt eget tempo til du kjenner at pulsen har roet seg.` },
    { id: 'ro-2', category: 'ro', title: 'Slipp prestasjonsangsten', duration: '8 min',
      manus: `Prestasjonsangst er ofte fremtiden som blander seg inn i nået. Vi skal bringe deg tilbake hit.\n\nLegg merke til den urolige følelsen uten å skyve den bort. Den er informasjon, ikke en fiende.\n\nSpør: hva er det verste som faktisk kan skje? Se det tydelig. Spør deretter: hva ville jeg gjort hvis det skjedde? Du har et svar. Det gjør det mindre skummelt.\n\nGjenta: "Jeg har forberedt meg. Jeg kan håndtere det som kommer, selv om det ikke blir perfekt."\n\nKjenn pusten din bli litt dypere. Skuldrene litt lavere.\n\nDu skal ikke bli angstfri. Du skal bli i stand til å handle med angsten i baksetet, ikke i førersetet.` },
    { id: 'ro-3', category: 'ro', title: 'Ro før eksamen', duration: '6 min',
      manus: `Om litt skal du vise hva du kan. Det du har lært, er allerede der inne i deg.\n\nTa tre langsomme åndedrag. La ut-pusten være lengre enn inn-pusten.\n\nSi til deg selv: "Jeg har gjort forberedelsene jeg kunne. Nå handler det om å hente ut det jeg vet, ett spørsmål i gangen."\n\nHvis panikken kommer under eksamen, husk denne øvelsen: tre dype åndedrag, si "ett spørsmål i gangen" til deg selv, og fortsett.\n\nDu trenger ikke å vite alt. Du trenger bare å vise det du vet, rolig og strukturert.\n\nKjenn at du er klar til å gå inn dit med et klart hode.` },
    { id: 'selvtillit-1', category: 'selvtillit', title: 'Bygg indre selvtillit', duration: '6 min',
      manus: `Selvtillit bygges ikke av at alt går bra. Den bygges av at du har møtt vansker før og kommet gjennom dem.\n\nTenk på en gang du klarte noe du var usikker på om du kunne klare. Se det for deg tydelig. Hvordan kjentes det i kroppen etterpå?\n\nDen samme kapasiteten er i deg nå. Den har ikke forsvunnet.\n\nSi til deg selv: "Jeg har klart vanskelige ting før. Jeg har det som trengs for å møte det som kommer nå."\n\nSelvtillit er ikke å vite at du vil lykkes. Det er å vite at du vil møte opp for deg selv, uansett utfall.\n\nBær denne følelsen med deg videre i dagen.` },
    { id: 'selvtillit-2', category: 'selvtillit', title: 'Snakk til deg selv som en coach', duration: '5 min',
      manus: `Legg merke til hvordan du snakker til deg selv når noe går dårlig. Ville du snakket til en du er glad i på den måten?\n\nEn god coach er ærlig, men aldri nedbrytende. En god coach peker på hva som gikk bra, og hva som kan justeres.\n\nTenk på noe du er kritisk til deg selv for akkurat nå. Prøv å si det på nytt, som en coach ville sagt det: "Det gikk ikke som planlagt. Hva kan du ta med deg videre?"\n\nGjenta: "Jeg kan være ærlig med meg selv uten å være hard mot meg selv."\n\nDenne stemmen, den rolige og konstruktive, er den du skal trene opp. Bruk den fra nå.` },
    { id: 'selvtillit-3', category: 'selvtillit', title: 'Fra tvil til handling', duration: '7 min',
      manus: `Tvil er normalt. Det betyr at du bryr deg om utfallet. Problemet er når tvilen får deg til å stå stille.\n\nHva er den tvilen som er mest til stede for deg akkurat nå? Sett ord på den, for deg selv.\n\nSpør: hva er den minste handlingen jeg kan gjøre akkurat nå, selv med denne tvilen til stede? Ikke den perfekte handlingen. Den minste.\n\nSe deg selv gjøre den handlingen, med tvilen fortsatt der, men uten at den stopper deg.\n\nSi: "Jeg trenger ikke fjerne tvilen for å handle. Jeg tar handlingen med meg, sammen med tvilen."\n\nNår du er klar, ta det første, lille steget.` },
    { id: 'restitusjon-1', category: 'restitusjon', title: 'Mental nedkjøling etter prestasjon', duration: '6 min',
      manus: `Uansett hvordan det gikk, er denne økten over nå. Kroppen og hodet ditt trenger å skru ned tempoet.\n\nTa noen lange åndedrag. La kjeven, pannen og hendene slappe av.\n\nTenk gjennom økten uten å dømme: hva skjedde? Bare observer, som om du så på en annen person.\n\nFinn én ting du kan lære av dette, og én ting du faktisk gjorde bra, uansett resultat.\n\nSi til deg selv: "Denne prestasjonen er ferdig. Jeg tar med meg lærdommen, og legger fra meg resten."\n\nLa kroppen din senke pulsen. Du har lov til å hvile nå.` },
    { id: 'fokus-4', category: 'fokus', title: 'Visualisering før stor prestasjon', duration: '8 min',
      manus: `Sett deg et sted du kan være uforstyrret et par minutter.\n\nSe for deg situasjonen som kommer, i detalj. Hvor er du? Hva ser du rundt deg? Hvem er der?\n\nSe deg selv gå inn i situasjonen rolig og forberedt. Legg merke til hvordan kroppen din beveger seg når du er i din beste tilstand.\n\nSpol gjennom de vanskeligste øyeblikkene i forkant. Se deg selv møte dem med det du har trent på. Du blir ikke satt ut. Du justerer, og fortsetter.\n\nSe deg selv komme gjennom det, uansett eksakt resultat, med hodet høyt fordi du var til stede og ga det du hadde.\n\nÅpne øynene. Kroppen din har nå en erfaring den kan kjenne igjen når den virkelige situasjonen kommer.` },
    { id: 'fokus-5', category: 'fokus', title: 'Refokusering etter en feil', duration: '5 min',
      manus: `Du gjorde nettopp en feil, eller noe gikk ikke som planlagt. Det som skjer i de neste ti sekundene bestemmer resten av prestasjonen din.\n\nTa ett bestemt åndedrag. Ikke tre, ikke fem. Ett er nok akkurat nå.\n\nSi til deg selv, kort og bestemt: "Det skjedde. Det er over. Nå handler det om det neste."\n\nIkke bruk tid på å analysere feilen mens du fortsatt er i situasjonen. Det kan du gjøre etterpå, med et klart hode.\n\nFlytt blikket, fysisk om du kan, til det som kommer nå. Rett oppmerksomheten dit.\n\nDu har trent for akkurat dette øyeblikket, ikke for å være feilfri, men for å komme deg videre raskt.` },
    { id: 'ro-4', category: 'ro', title: 'Ro i venting og overgangsfaser', duration: '5 min',
      manus: `Venting er ofte det vanskeligste, ikke selve prestasjonen. Denne øvelsen er for de minuttene før noe skal skje.\n\nLegg merke til at kroppen kanskje vil skynde seg, selv om det ikke er noe å skynde seg med akkurat nå.\n\nPust langsomt inn gjennom nesen. Tell til fire. Pust sakte ut. Tell til seks. Den lengre utpusten sender kroppen en beskjed om å senke tempoet.\n\nSi til deg selv: "Jeg trenger ikke gjøre noe med denne ventetiden. Jeg kan bare være i den."\n\nLegg merke til noe konkret rundt deg, en lyd, en temperatur, en tekstur. Det holder deg i nået i stedet for i bekymring om det som kommer.\n\nNår tiden er inne, vil du være klar. Akkurat nå er det bare lov å vente.` },
    { id: 'ro-5', category: 'ro', title: 'Slippe kontrollbehovet', duration: '6 min',
      manus: `Noen ganger er uroen ikke frykt for å mislykkes, men et sterkt behov for å kontrollere ting som egentlig ikke er i dine hender.\n\nTenk på situasjonen som bekymrer deg nå. Del den i to: det du faktisk kan påvirke, og det du ikke kan.\n\nLegg alt du ikke kan påvirke i en tenkt boks, og sett den til side. Det betyr ikke at det ikke betyr noe. Det betyr at å bære på det akkurat nå ikke hjelper deg.\n\nSe på det som er igjen, det du faktisk kan gjøre noe med. Er det mindre enn du trodde? Ofte er det det.\n\nSi til deg selv: "Jeg gjør det jeg kan med det jeg har kontroll over. Resten får være som det blir."\n\nKjenn at skuldrene senkes litt når du legger fra deg det som ikke er ditt å bære.` },
    { id: 'selvtillit-4', category: 'selvtillit', title: 'Stå i kroppen din', duration: '5 min',
      manus: `Kroppsholdning påvirker hvordan du kjenner deg selv, ikke bare hvordan andre ser deg.\n\nReis deg, om du kan. Stå med fotsålene godt i gulvet, skuldrene trukket litt bakover og ned, brystkassen åpen.\n\nHold denne posituren i ett minutt. Legg merke til om noe endrer seg i hvordan du tenker om deg selv, selv om det er en liten forskjell.\n\nSi til deg selv, mens du står slik: "Jeg tar plass. Jeg har rett til å være her, med det jeg kan og det jeg fortsatt lærer."\n\nDette er ikke skuespill. Kroppen din sender signaler til hjernen din, akkurat som hjernen sender signaler til kroppen.\n\nBruk denne holdningen aktivt i minuttene før noe som krever selvtillit av deg.` },
    { id: 'selvtillit-5', category: 'selvtillit', title: 'Slutt å sammenligne deg med andre', duration: '6 min',
      manus: `Sammenligning stjeler ofte mer energi enn den gir nytte. Denne øvelsen er for når andres prestasjoner fyller for mye plass i hodet ditt.\n\nTenk på personen eller personene du sammenligner deg med akkurat nå. Legg merke til hvordan kroppen reagerer når du tenker på dem.\n\nSpør deg selv: kjenner jeg hele historien deres, eller bare det jeg ser utenfra? Vanligvis er svaret at du ikke gjør det.\n\nFlytt blikket til din egen vei. Hvor stod du for et år siden? Hva har du bygget siden da, som ingen andre har bygget på akkurat samme måte?\n\nSi til deg selv: "Min utvikling måles mot meg selv i går, ikke mot noen andre i dag."\n\nDette er ikke for å slå av konkurranseinstinktet ditt. Det er for å rette det mot noe som faktisk gjør deg bedre.` },
    { id: 'restitusjon-2', category: 'restitusjon', title: 'Kroppsskanning for avspenning', duration: '7 min',
      manus: `Legg deg ned eller sitt godt tilbakelent et sted du kan være uforstyrret.\n\nStart ved føttene. Legg merke til om det er spenning der. Du trenger ikke gjøre noe med den, bare legge merke til den.\n\nFlytt oppmerksomheten oppover, gradvis: leggene, lårene, magen, brystet, hendene, armene, skuldrene, nakken, kjeven og ansiktet.\n\nHvert sted du legger merke til spenning, gi det et lite mentalt nikk: "Jeg ser deg. Du kan slappe av nå om du vil."\n\nDet er ingen konkurranse i denne øvelsen. Noen dager slapper kroppen lettere av enn andre.\n\nBli liggende eller sittende et minutt til, og legg merke til hvordan hele kroppen kjennes annerledes enn da du startet.` },
    { id: 'restitusjon-3', category: 'restitusjon', title: 'Restitusjon etter tap eller nederlag', duration: '7 min',
      manus: `Det gikk ikke som du ønsket. Denne øvelsen er ikke for å bortforklare det, men for å hjelpe deg videre uten å bære det som en stein i magen.\n\nTillat deg selv å kjenne skuffelsen. Den er der fordi noe betydde noe for deg, ikke fordi du er svak.\n\nSpør, når du er klar: hva var faktisk innenfor min kontroll denne gangen, og hva var det ikke? Vær ærlig, ikke hard.\n\nFinn én konkret ting du tar med deg videre, en lærdom, ikke en dom over deg selv som person.\n\nSi til deg selv: "Dette resultatet forteller noe om denne dagen. Det forteller ikke hele historien om hvem jeg er."\n\nLa pusten din bli dypere. Nederlaget er en del av veien, ikke enden på den.` },
    { id: 'restitusjon-4', category: 'restitusjon', title: 'Mental forberedelse til søvn', duration: '6 min',
      manus: `Denne øvelsen hjelper deg å legge fra deg dagen før du sover, slik at hodet ikke fortsetter å jobbe mens kroppen prøver å hvile.\n\nLigg komfortabelt. Ta tre åndedrag der utpusten er lengre enn innpusten.\n\nGå kort gjennom dagen, uten å dvele: hva skjedde av betydning i dag? Bare observer, som overskrifter, ikke detaljer.\n\nSpør: er det noe jeg må gjøre noe med akkurat nå? Om svaret er nei, si til deg selv: "Dette kan vente til i morgen. Akkurat nå er det ingenting jeg må løse."\n\nRett oppmerksomheten mot kroppens tyngde mot underlaget. La den bli tyngre for hvert åndedrag.\n\nDet er greit om tanker fortsatt dukker opp. Du trenger ikke jage dem bort, bare la dem passere som skyer.` },
    { id: 'restitusjon-5', category: 'restitusjon', title: 'Ukentlig restart', duration: '5 min',
      manus: `Bruk denne øvelsen én gang i uken, for eksempel søndag kveld, for å runde av og starte klar.\n\nTenk gjennom uken som har gått. Hva er du mest fornøyd med at du gjorde, uansett hvor stort eller lite det var?\n\nHva slet du med? Ikke for å dømme deg selv, men for å legge merke til et mønster du kan justere.\n\nSpør: hva er den ene tingen jeg vil gi mest oppmerksomhet neste uke?\n\nSi til deg selv: "Forrige uke er ferdig. Jeg tar med meg det som var nyttig, og starter den nye uken med et rent blad."\n\nTa et par dype åndedrag, og la roen fra denne økten følge deg inn i uken som kommer.` },

  en: [
    { id: 'fokus-1', category: 'fokus', title: 'Pre-competition focus', duration: '5 min',
      manus: `Settle into a comfortable position, or stand if that suits you better, before you perform.\n\nTake three deep breaths. Feel your shoulders drop a little each time you breathe out.\n\nAsk yourself: what is the one thing I need to focus on right now? Not the outcome. Not what others think. Just the single action in front of you.\n\nSay that action to yourself, out loud or silently. "I'm focusing on ______."\n\nFeel that your body is ready. You've trained for this. You don't need to be perfect, you just need to be present for what's happening now.\n\nWhen you're ready, stand up, or open your eyes, and step into what's waiting for you with that one focus.` },
    { id: 'fokus-2', category: 'fokus', title: 'Concentration under pressure', duration: '7 min',
      manus: `Pressure isn't your enemy. Pressure is a sign that something matters to you.\n\nNotice where in your body you feel the pressure right now. Breathe into that area, not away from it.\n\nWhen your thoughts start spinning, do this: name three things you can see, three things you can hear, and notice how you're sitting or standing. This brings you back to the present.\n\nAsk yourself: what is within my control right now? Focus only there.\n\nRepeat to yourself: "I don't need to control everything. I just need to do the next right thing."\n\nTake one more deep breath, and move forward with a narrower, clearer focus.` },
    { id: 'fokus-3', category: 'fokus', title: 'Reset between tasks', duration: '4 min',
      manus: `This exercise is for the moments in between things, between meetings, between sets, between exam questions.\n\nClose your eyes if you can. Take one breath that lasts a little longer than usual.\n\nImagine setting down what you just did, like a box you place aside. It's finished. It doesn't need to follow you forward.\n\nAsk yourself: what does the next task require of me? Bring up that energy now, not the energy from what came before.\n\nStretch your body a little if you'd like. Roll your shoulders back once.\n\nYou're reset. Ready for what's next.` },
    { id: 'ro-1', category: 'ro', title: 'Box breathing for calm', duration: '5 min',
      manus: `This exercise uses box breathing: four equal parts, in, hold, out, hold.\n\nGet comfortable. Let your shoulders drop away from your ears.\n\nBreathe in through your nose for four seconds. Hold for four seconds. Breathe out through your mouth for four seconds. Hold empty for four seconds.\n\nRepeat this pattern. You can use the breathing exercise in the app as a visual guide to the rhythm.\n\nEach round you complete sends your body a message: it's safe to slow down now. Your nervous system is listening to your breath.\n\nContinue at your own pace until you feel your pulse has settled.` },
    { id: 'ro-2', category: 'ro', title: 'Letting go of performance anxiety', duration: '8 min',
      manus: `Performance anxiety is often the future intruding on the present. Let's bring you back here.\n\nNotice the uneasy feeling without pushing it away. It's information, not an enemy.\n\nAsk: what's the worst that could actually happen? See it clearly. Then ask: what would I do if it happened? You have an answer. That makes it less frightening.\n\nRepeat: "I've prepared. I can handle what comes, even if it isn't perfect."\n\nFeel your breath get a little deeper. Your shoulders a little lower.\n\nYou're not aiming to become anxiety-free. You're aiming to be able to act with the anxiety in the back seat, not in the driver's seat.` },
    { id: 'ro-3', category: 'ro', title: 'Calm before an exam', duration: '6 min',
      manus: `In a little while you'll get to show what you know. What you've learned is already inside you.\n\nTake three slow breaths. Let the exhale be longer than the inhale.\n\nSay to yourself: "I've done the preparation I could. Now it's about retrieving what I know, one question at a time."\n\nIf panic hits during the exam, remember this exercise: three deep breaths, say "one question at a time" to yourself, and continue.\n\nYou don't need to know everything. You just need to show what you know, calmly and in order.\n\nFeel that you're ready to walk in there with a clear head.` },
    { id: 'selvtillit-1', category: 'selvtillit', title: 'Build inner confidence', duration: '6 min',
      manus: `Confidence isn't built by everything going well. It's built by having faced difficulty before and come through it.\n\nThink of a time you managed something you weren't sure you could. Picture it clearly. How did it feel in your body afterward?\n\nThat same capacity is in you now. It hasn't gone anywhere.\n\nSay to yourself: "I've managed hard things before. I have what it takes to meet what's coming now."\n\nConfidence isn't knowing you'll succeed. It's knowing you'll show up for yourself, regardless of outcome.\n\nCarry this feeling with you through the rest of the day.` },
    { id: 'selvtillit-2', category: 'selvtillit', title: 'Talk to yourself like a coach', duration: '5 min',
      manus: `Notice how you talk to yourself when something goes badly. Would you talk to someone you love that way?\n\nA good coach is honest, but never tears you down. A good coach points out what went well, and what can be adjusted.\n\nThink of something you're being critical of yourself for right now. Try saying it again, the way a coach would: "That didn't go as planned. What can you take with you from it?"\n\nRepeat: "I can be honest with myself without being hard on myself."\n\nThis voice, calm and constructive, is the one you're training. Use it from now on.` },
    { id: 'selvtillit-3', category: 'selvtillit', title: 'From doubt to action', duration: '7 min',
      manus: `Doubt is normal. It means you care about the outcome. The problem is when doubt makes you stand still.\n\nWhat's the doubt that's most present for you right now? Put it into words, just for yourself.\n\nAsk: what's the smallest action I can take right now, even with this doubt present? Not the perfect action. The smallest one.\n\nSee yourself taking that action, with the doubt still there, but without it stopping you.\n\nSay: "I don't need to remove the doubt to act. I bring the action with me, alongside the doubt."\n\nWhen you're ready, take that first, small step.` },
    { id: 'restitusjon-1', category: 'restitusjon', title: 'Mental cool-down after performing', duration: '6 min',
      manus: `Regardless of how it went, this session is over now. Your body and mind need to power down.\n\nTake a few long breaths. Let your jaw, forehead and hands relax.\n\nThink back through the session without judging it: what happened? Just observe, as if watching someone else.\n\nFind one thing you can learn from this, and one thing you actually did well, regardless of the result.\n\nSay to yourself: "This performance is finished. I take the lesson with me, and set down the rest."\n\nLet your pulse come down. You're allowed to rest now.` },
    { id: 'fokus-4', category: 'fokus', title: 'Visualization before a big performance', duration: '8 min',
      manus: `Find a place where you can be undisturbed for a couple of minutes.\n\nPicture the situation ahead of you, in detail. Where are you? What do you see around you? Who's there?\n\nSee yourself stepping into the situation calm and prepared. Notice how your body moves when you're at your best.\n\nFast-forward through the hardest moments in advance. See yourself meeting them with what you've trained for. You don't get thrown off. You adjust, and keep going.\n\nSee yourself coming through it, whatever the exact outcome, with your head held high because you showed up and gave what you had.\n\nOpen your eyes. Your body now has an experience it can recognize when the real situation arrives.` },
    { id: 'fokus-5', category: 'fokus', title: 'Refocusing after a mistake', duration: '5 min',
      manus: `You just made a mistake, or something didn't go as planned. What happens in the next ten seconds decides the rest of your performance.\n\nTake one deliberate breath. Not three, not five. One is enough right now.\n\nSay to yourself, short and firm: "That happened. It's over. Now it's about what's next."\n\nDon't spend time analyzing the mistake while you're still in the situation. You can do that afterward, with a clear head.\n\nShift your gaze, physically if you can, to what's coming now. Direct your attention there.\n\nYou've trained for exactly this moment, not to be flawless, but to move on quickly.` },
    { id: 'ro-4', category: 'ro', title: 'Calm in waiting and transitions', duration: '5 min',
      manus: `Waiting is often the hardest part, not the performance itself. This exercise is for those minutes before something is about to happen.\n\nNotice that your body might want to rush, even though there's nothing to rush right now.\n\nBreathe in slowly through your nose. Count to four. Breathe out slowly. Count to six. The longer exhale sends your body a message to slow down.\n\nSay to yourself: "I don't need to do anything about this waiting. I can just be in it."\n\nNotice something concrete around you, a sound, a temperature, a texture. It keeps you in the present instead of worrying about what's coming.\n\nWhen the time comes, you'll be ready. Right now, it's simply okay to wait.` },
    { id: 'ro-5', category: 'ro', title: 'Releasing the need for control', duration: '6 min',
      manus: `Sometimes the unease isn't fear of failing, but a strong need to control things that aren't actually in your hands.\n\nThink of the situation worrying you right now. Split it in two: what you can actually influence, and what you can't.\n\nPlace everything you can't influence into an imagined box, and set it aside. That doesn't mean it doesn't matter. It means carrying it right now isn't helping you.\n\nLook at what's left, what you can actually do something about. Is it smaller than you thought? Often it is.\n\nSay to yourself: "I do what I can with what I have control over. The rest gets to be what it is."\n\nFeel your shoulders drop a little as you set down what isn't yours to carry.` },
    { id: 'selvtillit-4', category: 'selvtillit', title: 'Stand in your body', duration: '5 min',
      manus: `Posture affects how you feel about yourself, not just how others see you.\n\nStand up, if you can. Plant your feet firmly on the floor, shoulders drawn slightly back and down, chest open.\n\nHold this posture for one minute. Notice if anything shifts in how you think about yourself, even a small difference.\n\nSay to yourself, while standing like this: "I take up space. I have the right to be here, with what I can do and what I'm still learning."\n\nThis isn't pretending. Your body sends signals to your brain, just as your brain sends signals to your body.\n\nUse this posture actively in the minutes before something that requires confidence of you.` },
    { id: 'selvtillit-5', category: 'selvtillit', title: 'Stop comparing yourself to others', duration: '6 min',
      manus: `Comparison often steals more energy than it gives value. This exercise is for when other people's performances take up too much space in your head.\n\nThink of the person or people you're comparing yourself to right now. Notice how your body reacts when you think of them.\n\nAsk yourself: do I know their whole story, or just what I see from the outside? Usually the answer is that you don't.\n\nShift your gaze to your own path. Where were you a year ago? What have you built since then, that no one else has built in quite the same way?\n\nSay to yourself: "My progress is measured against myself yesterday, not against anyone else today."\n\nThis isn't about switching off your competitive instinct. It's about pointing it at something that actually makes you better.` },
    { id: 'restitusjon-2', category: 'restitusjon', title: 'Body scan for relaxation', duration: '7 min',
      manus: `Lie down or sit back comfortably somewhere you can be undisturbed.\n\nStart at your feet. Notice if there's tension there. You don't need to do anything about it, just notice it.\n\nMove your attention upward, gradually: calves, thighs, stomach, chest, hands, arms, shoulders, neck, jaw and face.\n\nWherever you notice tension, give it a small mental nod: "I see you. You can relax now if you want to."\n\nThere's no competition in this exercise. Some days the body relaxes more easily than others.\n\nStay lying down or seated for one more minute, and notice how your whole body feels different from when you started.` },
    { id: 'restitusjon-3', category: 'restitusjon', title: 'Recovering from a loss or setback', duration: '7 min',
      manus: `It didn't go the way you wanted. This exercise isn't about explaining it away, but about helping you move forward without carrying it like a stone in your stomach.\n\nAllow yourself to feel the disappointment. It's there because something mattered to you, not because you're weak.\n\nAsk, when you're ready: what was actually within my control this time, and what wasn't? Be honest, not harsh.\n\nFind one concrete thing you're taking forward, a lesson, not a verdict on who you are as a person.\n\nSay to yourself: "This result says something about this day. It doesn't tell the whole story of who I am."\n\nLet your breath deepen. The setback is part of the path, not the end of it.` },
    { id: 'restitusjon-4', category: 'restitusjon', title: 'Mental preparation for sleep', duration: '6 min',
      manus: `This exercise helps you set the day down before sleep, so your mind doesn't keep working while your body tries to rest.\n\nLie down comfortably. Take three breaths where the exhale is longer than the inhale.\n\nBriefly move through the day, without dwelling: what happened that mattered today? Just observe, like headlines, not details.\n\nAsk: is there anything I need to deal with right now? If the answer is no, say to yourself: "This can wait until tomorrow. Right now there's nothing I need to solve."\n\nBring your attention to the weight of your body against the surface beneath you. Let it grow heavier with each breath.\n\nIt's fine if thoughts keep showing up. You don't need to chase them away, just let them pass like clouds.` },
    { id: 'restitusjon-5', category: 'restitusjon', title: 'Weekly restart', duration: '5 min',
      manus: `Use this exercise once a week, for example Sunday evening, to wrap up and start fresh.\n\nThink through the week that's passed. What are you most pleased you did, no matter how big or small it was?\n\nWhat did you struggle with? Not to judge yourself, but to notice a pattern you can adjust.\n\nAsk: what's the one thing I want to give the most attention next week?\n\nSay to yourself: "Last week is done. I take what was useful with me, and start the new week with a clean slate."\n\nTake a couple of deep breaths, and let the calm from this session follow you into the week ahead.` },
  ],
};

function detectLang() { const l = (navigator.language || 'en').toLowerCase(); return (l.startsWith('nb') || l.startsWith('nn') || l.startsWith('no')) ? 'no' : 'en'; }

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
      if (!('onboarded' in parsed)) state.onboarded = true;
    }
  } catch (e) { console.warn('load()', e); }
  if (!state.lang) state.lang = detectLang();
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function applyTheme() {
  if (state.theme === 'light' || state.theme === 'dark') document.documentElement.setAttribute('data-theme', state.theme);
  else document.documentElement.removeAttribute('data-theme');
}
function setTheme(v) { state.theme = v; save(); applyTheme(); render(); }
let pendingComebackDays = 0;
function checkComeback() {
  const today = todayStr();
  if (state.onboarded && state.lastOpenDate && state.lastOpenDate !== today) {
    const days = Math.round((new Date(today) - new Date(state.lastOpenDate)) / 86400000);
    if (days >= 3) pendingComebackDays = days;

  state.lastOpenDate = today;
  save();
}

  document.querySelector('[data-nav="progress"]').textContent = t('navProgress');

  const main = document.getElementById('main');
  if (currentExerciseId) { main.innerHTML = renderExerciseDetail(currentExerciseId); return; }

/* ---------- Home ---------- */
function weeklyActiveDays() {
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    if (state.completedIds.some(k => k.endsWith(':' + ds))) count++;
  }
  return count;
}
function pickRecommended() {
  const list = exs();
  let pool = list;
  if (state.goal) { const gp = list.filter(e => e.category === state.goal); if (gp.length) pool = gp; }
  const notDoneToday = pool.filter(e => !state.completedIds.includes(e.id + ':' + todayStr()));
  const finalPool = notDoneToday.length ? notDoneToday : pool;
  return finalPool[new Date().getDate() % finalPool.length];
}
function renderHome() {
  const doneToday = state.lastCompletedDate === todayStr();
  const pick = pickRecommended();
  const cat = cats().find(c => c.id === pick.category);
  const activeDays = weeklyActiveDays();
  const ringC = 2 * Math.PI * 40;
  const ringOffset = ringC * (1 - activeDays / 7);
  const todayMood = state.checkins[todayStr()];
  return `
    <h1>${t('greet')}</h1>
    <p class="sub">${doneToday ? t('doneToday') : t('notDoneToday')}</p>
    <div class="card ringCard">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="48" cy="48" r="40" fill="none" stroke="var(--border)" stroke-width="8"/>
        <circle cx="48" cy="48" r="40" fill="none" stroke="var(--blue)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${ringC.toFixed(1)}" stroke-dashoffset="${ringOffset.toFixed(1)}" transform="rotate(-90 48 48)"/>
      </svg>
      <div class="ringMeta"><b>${activeDays}/7</b><span>${t('weekRingLabel')}</span></div>
    </div>
    <div class="card">
      <div class="cardLabel">${t('moodTitle')}</div>
      <div class="moodRow">${MOODS.map((m, i) => `<button class="moodBtn ${todayMood === i + 1 ? 'on' : ''}" onclick="setMood(${i + 1})">${m}</button>`).join('')}</div>
    </div>

function renderExerciseDetail(id) {

function renderPlayerFav(id) {
  const btn = document.getElementById('playerFavBtn');
  if (btn) btn.innerHTML = icon(state.favorites.includes(id) ? 'heart-filled' : 'heart', 23);
}
function openExercise(id) {
  currentExerciseId = id;
  render();
  startPlayerTimer(id);
}
function closeExercise() { stopPlayerTimer(); currentExerciseId = null; render(); }
function startPlayerTimer(id) {
  stopPlayerTimer();
  const e = exs().find(x => x.id === id);
  const mins = parseInt(e.duration) || 5;
  playerDurationSec = mins * 60;
  playerElapsed = 0;
  playerRunning = true;
  playerTimer = setInterval(() => {
    if (!playerRunning) return;
    playerElapsed++;
    const fill = document.getElementById('playerFill');
    if (!fill) { stopPlayerTimer(); return; }
    fill.style.width = Math.min(100, (playerElapsed / playerDurationSec) * 100) + '%';
    if (playerElapsed >= playerDurationSec) stopPlayerTimer();
  }, 1000);
}
function stopPlayerTimer() { if (playerTimer) { clearInterval(playerTimer); playerTimer = null; } playerRunning = false; }

function logCompletion(id) {
  const key = id + ':' + todayStr();
  if (state.completedIds.includes(key)) return;
  state.completedIds.push(key);
  const today = todayStr();
  if (state.lastCompletedDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    state.streak = (state.lastCompletedDate === yesterday) ? state.streak + 1 : 1;
    state.lastCompletedDate = today;
  }
  save();
  hapticSuccess();
  toast(t('streakToast')(state.streak));
  render();
}

function buildWeekChart() {
  const labelsNo = ['S', 'M', 'T', 'O', 'T', 'F', 'L'];
  const labelsEn = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  const labels = state.lang === 'no' ? labelsNo : labelsEn;
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const count = state.completedIds.filter(k => k.endsWith(':' + ds)).length;
    days.push({ date: ds, count, label: labels[d.getDay()], isToday: ds === todayStr() });
  }
  const max = Math.max(1, ...days.map(d => d.count));
  return days.map(d => ({ ...d, h: Math.round(6 + (d.count / max) * 46) }));
}
function describeCompletedKey(key) {
  const id = key.split(':')[0];
  const ex = exs().find(e => e.id === id);
  if (ex) { const cat = cats().find(c => c.id === ex.category); return cat ? `${ex.title} (${cat.label})` : ex.title; }
  const yoga = yogaRoutines().find(r => r.id === id);
  if (yoga) return `${yoga.title} (${t('yogaTitle')})`;
  return id;
}

function buildTenWeekChart() {
  const weeks = [];
  for (let w = 9; w >= 0; w--) {
    const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate() - w * 7);
    const weekDates = [];
    for (let d = 6; d >= 0; d--) {
      const day = new Date(weekEnd); day.setDate(day.getDate() - d);
      weekDates.push(day.toISOString().slice(0, 10));
    }
    const ids = state.completedIds.filter(k => weekDates.includes(k.split(':')[1]));
    weeks.push({ startDate: weekDates[0], endDate: weekDates[6], dates: weekDates, count: ids.length, ids, isCurrent: w === 0 });
  }
  const max = Math.max(1, ...weeks.map(x => x.count));
  return weeks.map(x => ({ ...x, h: Math.round(6 + (x.count / max) * 46) }));
}
function showWeekDetail(weekIndex) {

  const startLabel = new Date(week.startDate).toLocaleDateString(t('dateLocale'), { day: 'numeric', month: 'short' });
  const endLabel = new Date(week.endDate).toLocaleDateString(t('dateLocale'), { day: 'numeric', month: 'short' });

  const catCounts = {};

  const catRows = cats().filter(c => catCounts[c.id] > 0)

    </div>
  `;
  document.getElementById('modalWrap').classList.add('show');
}
function buildCategoryBalance() {
  const counts = {};
  cats().forEach(c => counts[c.id] = 0);
  state.completedIds.forEach(k => {
    const id = k.split(':')[0];
    const ex = exs().find(e => e.id === id);

function saveJournal() {
  const good = document.getElementById('jGood').value.trim();
  const hard = document.getElementById('jHard').value.trim();

/* ---------- Local notifications ---------- */
async function scheduleNotifications() {
  const LN = window.Capacitor?.Plugins?.LocalNotifications;
  if (!LN) return;
  const pending = await LN.getPending();
  if (pending.notifications.length) await LN.cancel({ notifications: pending.notifications.map(n => ({ id: n.id })) });
  const [hh, mm] = (state.reminderTime || '09:00').split(':').map(Number);
  const notifications = [];
  for (let i = 1; i <= 45; i++) {
    const d = new Date(); d.setDate(d.getDate() + i); d.setHours(hh, mm, 0, 0);
    notifications.push({ id: i, title: t('notifTitle'), body: t('notifBody'), schedule: { at: d } });
  }
  await LN.schedule({ notifications });
}
async function toggleNotif() {
  state.notifOn = !state.notifOn;
  save();
  const LN = window.Capacitor?.Plugins?.LocalNotifications;
  if (!LN) { render(); return; }
  if (state.notifOn) {
    const perm = await LN.requestPermissions();
    if (perm.display !== 'granted') { state.notifOn = false; save(); render(); return; }
    await scheduleNotifications();
  } else {
    const pending = await LN.getPending();
    if (pending.notifications.length) await LN.cancel({ notifications: pending.notifications.map(n => ({ id: n.id })) });
  }
  render();
}
function setReminderTime(v) { state.reminderTime = v; save(); if (state.notifOn) scheduleNotifications(); render(); }

async function scheduleWeeklyReflection() {
  const LN = window.Capacitor?.Plugins?.LocalNotifications;
  if (!LN) return;
  const pending = await LN.getPending();
  const old = pending.notifications.filter(n => n.id >= 500 && n.id < 600).map(n => ({ id: n.id }));
  if (old.length) await LN.cancel({ notifications: old });
  const [hh, mm] = (state.weeklyReflectionTime || '18:00').split(':').map(Number);
  const notifications = [];
  const first = new Date();
  first.setDate(first.getDate() + ((7 - first.getDay()) % 7 || 7));
  for (let i = 0; i < 10; i++) {
    const d = new Date(first); d.setDate(first.getDate() + i * 7); d.setHours(hh, mm, 0, 0);
    notifications.push({ id: 500 + i, title: t('notifTitle'), body: t('weeklyReflectionNotifBody'), schedule: { at: d } });
  }
  await LN.schedule({ notifications });
}
function setWeeklyReflectionTime(v) { state.weeklyReflectionTime = v; save(); if (state.weeklyReflectionOn) scheduleWeeklyReflection(); render(); }

}

/* ---------- Breathing overlay (animated) ---------- */
const BR_R = 92, BR_C = 2 * Math.PI * BR_R;
let brRaf = null, brPhaseIdx = 0, brRunning = false, brStart = null, currentBreathTech = null;
function startBreathing(techId) {
  const tech = breathTechniques().find(x => x.id === techId) || breathTechniques()[0];
  currentBreathTech = tech;
  const b = t('breath');
  brPhaseIdx = 0; brRunning = false; brStart = null;
  document.getElementById('breathTitle').textContent = tech.title;
  document.getElementById('orbPhase').textContent = b.press;
  document.getElementById('orbCount').textContent = '';
  document.getElementById('bRound').textContent = '';
  document.getElementById('bSafetyNote').textContent = b.safetyNote;
  document.getElementById('brStart').textContent = b.start;
  document.getElementById('brEnd').textContent = b.end;
  document.getElementById('brEnd').style.display = '';
  if (tech.adjustable) {
    document.getElementById('tempoLabel').innerHTML = b.pace + ': <b id="brTempoVal">4</b> ' + b.sec + '<input type="range" id="brTempo" min="3" max="6" step="0.5" value="4">';
    document.getElementById('brTempo').oninput = e => { document.getElementById('brTempoVal').textContent = e.target.value; };
  } else {
    document.getElementById('tempoLabel').innerHTML = '';
  }
  document.getElementById('breathOverlay').classList.add('show');
  document.getElementById('brStart').onclick = toggleBreath;
}
function toggleBreath() {
  const b = t('breath');
  const btn = document.getElementById('brStart');
  if (brRunning) { stopBreathTick(); btn.textContent = b.cont; document.getElementById('orbPhase').textContent = b.paused; document.getElementById('orbCount').textContent = ''; return; }
  btn.textContent = b.pause; brRunning = true; brStart = null; runBreathTick();
}
function easeInOut(x) { return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2) / 2; }
function runBreathTick() {
  const tick = ts => {
    if (!brRunning || !currentBreathTech) return;
    const orb = document.getElementById('orb');
    if (!orb) { brRaf = null; return; }
    const phases = currentBreathTech.phases;
    const phase = phases[brPhaseIdx % phases.length];
    let phaseMs;
    if (currentBreathTech.adjustable) {
      const tempoEl = document.getElementById('brTempo');
      phaseMs = (tempoEl ? parseFloat(tempoEl.value) : 4) * 1000;
    } else {
      phaseMs = (phase.seconds || 4) * 1000;
    }
    if (brStart === null) brStart = ts;
    const frac = Math.min((ts - brStart) / phaseMs, 1);
    let bv;
    if (phase.type === 'in') bv = easeInOut(frac);
    else if (phase.type === 'holdFull') bv = 1;
    else if (phase.type === 'out') bv = easeInOut(1 - frac);
    else bv = 0;
    orb.style.transform = `translate(-50%,-50%) scale(${(0.5 + 0.5*bv).toFixed(3)})`;
    const a1 = document.getElementById('aura1'), a2 = document.getElementById('aura2');
    if (a1) { a1.style.transform = `translate(-50%,-50%) scale(${(0.6+0.5*bv).toFixed(3)})`; a1.style.opacity = (0.14+0.34*bv).toFixed(2); }
    if (a2) { a2.style.transform = `translate(-50%,-50%) scale(${(0.72+0.82*bv).toFixed(3)})`; a2.style.opacity = (0.08+0.2*bv).toFixed(2); }
    const ring = document.getElementById('brRing');
    if (ring) ring.style.strokeDashoffset = (BR_C * (1 - bv)).toFixed(1);
    document.getElementById('orbPhase').textContent = phase.label;
    const secs = Math.ceil((phaseMs - (ts - brStart)) / 1000);
    document.getElementById('orbCount').textContent = secs > 0 ? secs : '';
    const round = Math.floor(brPhaseIdx / phases.length) + 1;
    document.getElementById('bRound').textContent = t('breath').round + ' ' + round + (currentBreathTech.maxRounds ? ' / ' + currentBreathTech.maxRounds : '');
    if (frac >= 1) {
      brPhaseIdx++; brStart = null;
      const completedRounds = Math.floor(brPhaseIdx / phases.length);
      if (currentBreathTech.maxRounds && completedRounds >= currentBreathTech.maxRounds) {
        finishBreathingSession();
        return;
      }
    }
    brRaf = requestAnimationFrame(tick);
  };
  brRaf = requestAnimationFrame(tick);
}
function finishBreathingSession() {
  stopBreathTick();
  const b = t('breath');
  const orb = document.getElementById('orb');
  if (orb) orb.style.transform = 'translate(-50%,-50%) scale(0.75)';
  document.getElementById('orbPhase').textContent = b.doneLabel;
  document.getElementById('orbCount').textContent = '';
  document.getElementById('bSafetyNote').textContent = '';
  const startBtn = document.getElementById('brStart');
  startBtn.textContent = b.doneCloseBtn;
  startBtn.onclick = stopBreathing;
  document.getElementById('brEnd').style.display = 'none';
}
function stopBreathTick() { brRunning = false; if (brRaf) { cancelAnimationFrame(brRaf); brRaf = null; } }
function stopBreathing() {
  stopBreathTick();
  document.getElementById('breathOverlay').classList.remove('show');
  currentBreathTech = null;
}

/* ---------- Yoga player (animated) ---------- */
let yogaState = null;
let yogaAudioCtx = null;
function playYogaTone(freq, duration, vol) {
  try {
    yogaAudioCtx = yogaAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = yogaAudioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}
function playYogaTick() { playYogaTone(700, 0.12, 0.15); }
function playYogaChime() { playYogaTone(1000, 0.35, 0.2); setTimeout(() => playYogaTone(1400, 0.4, 0.15), 90); }
function toggleYogaSound() {

  save();
  const btn = document.getElementById('yogaSoundBtn');
  if (btn) btn.innerHTML = icon(state.yogaSoundOn ? 'soundOn' : 'soundOff', 16);
}
function openYoga(id) {
  const routine = yogaRoutines().find(r => r.id === id);
  if (!routine) return;
  if (yogaState && yogaState.timer) clearInterval(yogaState.timer);
  yogaState = { routine, idx: 0, remaining: routine.poses[0].sec, paused: false, timer: null, done: false, intro: true };
  document.getElementById('yogaOverlay').classList.add('show');
  const soundBtn = document.getElementById('yogaSoundBtn');
  if (soundBtn) soundBtn.innerHTML = icon(state.yogaSoundOn ? 'soundOn' : 'soundOff', 16);
  renderYogaStage();
}
function startYogaSession() {
  if (!yogaState) return;
  yogaState.intro = false;
  renderYogaStage();
  startYogaTimer();
}
function renderYogaStage() {
  if (!yogaState) return;
  const { routine, idx, remaining, paused, done, intro } = yogaState;
  const titleEl = document.getElementById('yogaRoutineTitle');
  if (titleEl) titleEl.textContent = routine.title;
  const stageEl = document.getElementById('yogaStage');
  const btnRowEl = document.getElementById('yogaBtnRow');
  if (intro) {
    const mins = Math.round(routine.totalSec / 60);
    if (stageEl) stageEl.innerHTML = `
      <div class="yogaArtWrap">${poseArt(routine.poses[0].key, 170)}</div>
      <div class="yogaPoseName">${escapeHtml(routine.title)}</div>
      <div class="yogaIntroMeta">${mins} min · ${routine.poses.length} ${t('yogaPosesLabel')}</div>
    `;
    if (btnRowEl) btnRowEl.innerHTML = `<button class="yPause" onclick="startYogaSession()">${t('yogaStart')}</button>`;
    return;
  }
  if (done) {
    if (stageEl) stageEl.innerHTML = `<div class="doneCard"><b>${t('yogaDoneTitle')}</b><p style="color:rgba(255,255,255,0.75)">${t('yogaDoneMsg')}</p></div>`;
    if (btnRowEl) btnRowEl.innerHTML = `<button class="yPause" onclick="closeYoga()">${t('yogaClose')}</button>`;
    return;
  }
  const pose = routine.poses[idx];
  if (stageEl) stageEl.innerHTML = `
    <div class="yogaArtWrap">${poseArt(pose.key, 170)}</div>
    <div class="yogaPoseName">${escapeHtml(pose.name)}</div>
    <div class="yogaCue">${escapeHtml(pose.cue)}</div>
    <div class="yogaCount ${remaining <= 3 ? 'countdown' : ''}">${remaining}</div>
    <div class="yogaDots">${routine.poses.map((p, i) => `<span class="yogaDot ${i === idx ? 'on' : ''} ${i < idx ? 'done' : ''}"></span>`).join('')}</div>
  `;
  if (btnRowEl) btnRowEl.innerHTML = `
    <button class="yPause" onclick="toggleYogaPause()">${paused ? t('yogaResume') : t('yogaPause')}</button>
    <button class="ySkip" onclick="skipYogaPose()">${t('yogaSkip')}</button>
  `;
}
function startYogaTimer() {
  if (!yogaState) return;
  clearInterval(yogaState.timer);
  yogaState.timer = setInterval(() => {
    if (!yogaState || yogaState.paused || yogaState.done) return;
    yogaState.remaining--;
    if (yogaState.remaining <= 0) { advanceYogaPose(); return; }
    if (state.yogaSoundOn && yogaState.remaining <= 3) playYogaTick();
    const countEl = document.querySelector('#yogaStage .yogaCount');
    if (countEl) { countEl.textContent = yogaState.remaining; countEl.classList.toggle('countdown', yogaState.remaining <= 3); }
  }, 1000);
}
function advanceYogaPose() {
  if (!yogaState) return;
  yogaState.idx++;
  if (yogaState.idx >= yogaState.routine.poses.length) { finishYoga(); return; }
  if (state.yogaSoundOn) playYogaChime();
  yogaState.remaining = yogaState.routine.poses[yogaState.idx].sec;
  renderYogaStage();
}
function toggleYogaPause() { if (!yogaState) return; yogaState.paused = !yogaState.paused; renderYogaStage(); }
function skipYogaPose() { advanceYogaPose(); }
function finishYoga() {
  if (!yogaState) return;
  clearInterval(yogaState.timer);
  const key = yogaState.routine.id + ':' + todayStr();
  if (!state.completedIds.includes(key)) {
    state.completedIds.push(key);
    const today = todayStr();
    if (state.lastCompletedDate !== today) {
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      state.streak = (state.lastCompletedDate === yesterday) ? state.streak + 1 : 1;
      state.lastCompletedDate = today;
    }
    save();
  }
  hapticSuccess();
  yogaState.done = true;
  renderYogaStage();
}
function closeYoga() {
  try { if (yogaState && yogaState.timer) clearInterval(yogaState.timer); } catch (e) {}
  const ov = document.getElementById('yogaOverlay');
  if (ov) ov.classList.remove('show');
  yogaState = null;
  render();
}

/* ---------- Pre-performance ritual player ---------- */
let ritualStage = 0, ritRaf = null, ritPhase = 0, ritStart = null;
function renderRitualStageHtml() {
  const r = state.ritual;
  if (ritualStage === 0) {
    return `<div class="ritualLabel">${t('ritualTitle')}</div><div class="ritualText">${escapeHtml(r.mantra)}</div><div class="ritualSub">${t('ritualMantraSub')}</div><button class="btn full sand" style="margin-top:10px" onclick="advanceRitualStage()">${t('ritualNext')}</button>`;
  }
  if (ritualStage === 1) {
    return `
      <div class="ritualLabel">${t('ritualBreathLabel')}</div>
      <div class="orbWrap">
        <div class="aura" id="ritAura2"></div><div class="aura" id="ritAura1"></div>
        <div class="orb" id="ritOrb"></div>
        <svg width="220" height="220" viewBox="0 0 220 220" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)">
          <circle cx="110" cy="110" r="92" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="4"/>
          <circle id="ritRing" cx="110" cy="110" r="92" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-dasharray="578.1" stroke-dashoffset="578.1" transform="rotate(-90 110 110)"/>
        </svg>
      </div>
      <button class="btn full ghost" style="margin-top:10px;border:1px solid rgba(255,255,255,.4);color:#fff" onclick="advanceRitualStage()">${t('ritualNext')}</button>
    `;
  }
  return `<div class="ritualLabel">${t('ritualTitle')}</div><div class="ritualText">${escapeHtml(r.focusNote)}</div><div class="ritualSub">${t('ritualFocusSub')}</div><button class="btn full sand" style="margin-top:10px" onclick="closeRitual()">${t('ritualFinish')}</button>`;
}
function startRitual() {
  if (!state.ritual) return;
  ritualStage = 0;
  document.getElementById('ritualOverlay').classList.add('show');
  document.getElementById('ritualStage').innerHTML = renderRitualStageHtml();
}
function advanceRitualStage() {
  stopRitualBreath();
  ritualStage++;
  if (ritualStage > 2) { closeRitual(); return; }
  document.getElementById('ritualStage').innerHTML = renderRitualStageHtml();
  if (ritualStage === 1) { ritPhase = 0; ritStart = null; runRitualBreathTick(); }
}
function runRitualBreathTick() {
  const tick = ts => {
    const orb = document.getElementById('ritOrb');
    if (!orb) { ritRaf = null; return; }
    const tempoMs = 4000;
    if (ritStart === null) ritStart = ts;
    const frac = Math.min((ts - ritStart) / tempoMs, 1);
    const ph = ritPhase % 4;
    let bv;
    if (ph === 0) bv = easeInOut(frac); else if (ph === 1) bv = 1; else if (ph === 2) bv = easeInOut(1 - frac); else bv = 0;
    orb.style.transform = `translate(-50%,-50%) scale(${(0.5 + 0.5 * bv).toFixed(3)})`;
    const a1 = document.getElementById('ritAura1'), a2 = document.getElementById('ritAura2');
    if (a1) { a1.style.transform = `translate(-50%,-50%) scale(${(0.6 + 0.5 * bv).toFixed(3)})`; a1.style.opacity = (0.14 + 0.34 * bv).toFixed(2); }
    if (a2) { a2.style.transform = `translate(-50%,-50%) scale(${(0.72 + 0.82 * bv).toFixed(3)})`; a2.style.opacity = (0.08 + 0.2 * bv).toFixed(2); }
    const ring = document.getElementById('ritRing');
    if (ring) ring.style.strokeDashoffset = (BR_C * (1 - bv)).toFixed(1);
    if (frac >= 1) {
      ritPhase++;
      ritStart = null;
      if (ritPhase >= 12) { advanceRitualStage(); return; }
    }
    ritRaf = requestAnimationFrame(tick);
  };
  ritRaf = requestAnimationFrame(tick);
}
function stopRitualBreath() { if (ritRaf) { cancelAnimationFrame(ritRaf); ritRaf = null; } }
function closeRitual() {
  stopRitualBreath();
  document.getElementById('ritualOverlay').classList.remove('show');
}

/* ---------- Init ---------- */
load();
applyTheme();
checkComeback();
render();
if (pendingComebackDays) showComebackModal();
initRevenueCat();
(function() {
  const sp = document.getElementById('splash');
  if (sp) setTimeout(() => sp.remove(), 3000);
})();
</script>
